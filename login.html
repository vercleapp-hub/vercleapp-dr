<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الدكتور باي</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="glass-panel p-8 rounded-[3rem]">

        <div id="login-step" class="space-y-8">

            <div class="text-center">
                <h1 class="text-3xl font-black text-white">تسجيل الدخول</h1>
                <p class="text-slate-400 text-sm">أهلاً بك</p>
            </div>

            <!-- ✅ الفورم الصحيح -->
            <form id="login-form" class="space-y-4">

                <input type="tel" id="identifier" required
                    class="input-glass w-full py-3 px-4 rounded-xl"
                    placeholder="رقم الموبايل">

                <input type="password" id="password" required
                    class="input-glass w-full py-3 px-4 rounded-xl"
                    placeholder="كلمة المرور">

                <!-- زر تسجيل الدخول -->
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-xl">
                    دخول للنظام
                </button>

            </form>

            <!-- ✅ زر إنشاء حساب (خارج الفورم) -->
            <button onclick="window.location.href='register.html'"
                class="w-full border border-blue-500 text-blue-400 py-3 rounded-xl hover:bg-blue-500 hover:text-white transition">
                إنشاء حساب جديد
            </button>

        </div>

    </div>
</div>

<script src="login.js"></script>
</body>
</html>
