<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Dr Pay</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen font-[Tajawal]">

<div class="w-full max-w-md bg-slate-800 p-8 rounded-3xl shadow-2xl">

    <h1 class="text-white text-2xl font-black text-center mb-6">تسجيل الدخول</h1>

    <form id="login-form" class="space-y-4">

        <input 
            type="text" 
            id="phone" 
            placeholder="رقم الهاتف"
            class="w-full p-4 rounded-xl bg-slate-900 text-white outline-none"
            required
        >

        <input 
            type="password" 
            id="password" 
            placeholder="كلمة المرور"
            class="w-full p-4 rounded-xl bg-slate-900 text-white outline-none"
            required
        >

        <button 
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-xl font-bold">
            تسجيل الدخول
        </button>

    </form>

</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault()

    const phone = document.getElementById('phone').value
    const password = document.getElementById('password').value

    try {
        const res = await fetch('/api/auth?action=login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password })
        })

        const data = await res.json()

        if (data.error) {
            alert(data.error)
            return
        }

        // حفظ البيانات
        localStorage.setItem('drpay_token', data.token)
        localStorage.setItem('drpay_user', JSON.stringify(data.user))

        alert('تم تسجيل الدخول بنجاح ✅')

        // تحويل
        if (data.user.role === 'admin' || data.user.role === 'employee') {
            window.location.href = 'admin.html'
        } else {
            window.location.href = 'index.html'
        }

    } catch (err) {
        alert('خطأ في الاتصال بالسيرفر')
    }
})
</script>

</body>
</html>
