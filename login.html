<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الدكتور باي لخدمات الدفع الالكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        /* Glassmorphism & Animations */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Floating labels for Login */
        .floating-input:focus~.floating-label,
        .floating-input:not(:placeholder-shown)~.floating-label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #60a5fa;
            background-color: transparent;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Animated Background Blobs -->
    <div class="fixed inset-0 w-full h-full overscroll-none overflow-hidden z-0 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-72 h-72 md:w-96 md:h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-72 h-72 md:w-96 md:h-96 bg-indigo-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[20%] left-[20%] w-56 h-56 md:w-80 md:h-80 bg-emerald-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Main Container Card -->
    <div class="w-full max-w-lg glass-panel rounded-3xl p-6 sm:p-10 relative z-10">

        <!-- Header Branding -->
        <div class="text-center mb-10 relative z-10 flex flex-col items-center">
            <div class="mb-4 relative group">
            <div class="w-24 h-24 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[2.5rem] p-1 shadow-2xl shadow-blue-500/20 group-hover:scale-105 transition-transform duration-500">
                <div class="w-full h-full bg-slate-900 rounded-[2.2rem] flex items-center justify-center border border-white/10 overflow-hidden">
                    <img src="images/logo.png" alt="Logo" class="w-20 h-20 object-contain">
                </div>
            </div>
            <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-emerald-500 rounded-full border-4 border-slate-900 flex items-center justify-center shadow-lg animate-bounce">
                <i data-lucide="check" class="text-white w-5 h-5"></i>
            </div>
        </div>
            <h1 class="text-2xl sm:text-3xl font-black text-white mb-2 tracking-tight">الدكتور باي <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Dr Pay</span>
            </h1>
        </div>

        <!-- ================= [ LOGIN FORM ] ================= -->
        <form id="login-form" class="space-y-5 relative z-10">
            <!-- Mobile Field -->
            <div class="relative group">
                <input type="text" id="log-phone" required
                    class="floating-input w-full input-glass rounded-2xl px-12 py-4 pt-6 text-sm outline-none text-white font-mono placeholder-transparent peer"
                    placeholder="رقم المحمول">
                <label
                    class="floating-label absolute right-12 top-[1.1rem] text-slate-400 text-sm font-bold transition-all pointer-events-none origin-right">رقم
                    المحمول</label>
                <div
                    class="absolute right-4 top-4 bg-white/5 p-1.5 rounded-lg text-slate-400 group-focus-within:text-blue-400 transition-colors">
                    <i data-lucide="phone" class="w-4 h-4"></i>
                </div>
            </div>

            <!-- Password Field -->
            <div class="relative group">
                <input type="password" id="log-password" required
                    class="floating-input w-full input-glass rounded-2xl px-12 py-4 pt-6 text-sm outline-none text-white font-mono placeholder-transparent peer"
                    placeholder="كلمة المرور">
                <label
                    class="floating-label absolute right-12 top-[1.1rem] text-slate-400 text-sm font-bold transition-all pointer-events-none origin-right">كلمة
                    السر</label>
                <div
                    class="absolute right-4 top-4 bg-white/5 p-1.5 rounded-lg text-slate-400 group-focus-within:text-blue-400 transition-colors">
                    <i data-lucide="lock" class="w-4 h-4"></i>
                </div>
            </div>

            <!-- Options (Remember & Forgot) -->
            <div class="flex items-center justify-between px-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <div class="relative w-5 h-5 flex items-center justify-center">
                        <input type="checkbox" id="remember-me"
                            class="peer appearance-none w-5 h-5 border-2 border-slate-600 rounded-md checked:bg-blue-500 checked:border-blue-500 transition-all cursor-pointer">
                        <i data-lucide="check"
                            class="w-3 h-3 text-white absolute pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                    </div>
                    <span class="text-xs text-slate-300 font-bold group-hover:text-white transition-colors">تذكر بياناتي</span>
                </label>
                <a href="forgot-password.html" class="text-xs text-blue-400 font-bold hover:text-blue-300 transition-colors">نسيت كلمة السر؟</a>
            </div>

            <!-- Submit Login -->
            <button type="submit" id="log-btn"
                class="w-full mt-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black py-4 rounded-2xl transition-all shadow-[0_0_20px_rgba(37,99,235,0.3)] hover:shadow-[0_0_30px_rgba(37,99,235,0.5)] active:scale-95 flex items-center justify-center gap-2">
                دخول للنظام <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>

            <!-- Create Account Divider -->
            <div class="flex items-center justify-center gap-4 mt-6 opacity-70">
                <div class="h-px bg-slate-700 flex-1"></div>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">مستخدم جديد؟</span>
                <div class="h-px bg-slate-700 flex-1"></div>
            </div>

            <div class="text-center mt-4">
                <a href="register.html"
                    class="w-full py-4 text-sm font-bold text-slate-300 hover:text-white bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl transition-all flex items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-4 h-4 text-emerald-400"></i> إنشاء حساب تاجر جديد
                </a>
            </div>
        </form>

        <!-- ================= [ OTP VIEW (NEW DEVICE) ] ================= -->
        <div id="otp-view" class="hidden space-y-8 relative z-10 animate-fade-in text-center">
            <div class="space-y-2">
                <div class="w-20 h-20 bg-blue-500/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20 shadow-lg">
                    <i data-lucide="shield-check" class="text-blue-400 w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-black text-white px-2">حماية الحساب</h2>
                <p class="text-[11px] text-slate-400 leading-relaxed px-6" id="otp-hint">تم إرسال كود الـ OTP إلي WhatsApp الرقم المسجل تنتهي بـ ...</p>
            </div>
            
            <div class="flex justify-center gap-2 px-2" dir="ltr">
                <input type="text" maxlength="1" class="otp-box w-12 h-14 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-black text-blue-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-box w-12 h-14 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-black text-blue-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-box w-12 h-14 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-black text-blue-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                <span class="text-slate-600 flex items-center">-</span>
                <input type="text" maxlength="1" class="otp-box w-12 h-14 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-black text-blue-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-box w-12 h-14 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-black text-blue-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                <input type="text" maxlength="1" class="otp-box w-12 h-14 bg-slate-900 border border-slate-700 rounded-xl text-center text-xl font-black text-blue-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
            </div>
            
            <div class="px-2">
                <button onclick="verifyLoginOTP()" id="otp-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-xl active:scale-95 flex items-center justify-center gap-2">تفعيل كود الوصول <i data-lucide="check" class="w-5 h-5"></i></button>
                <button onclick="location.reload()" class="mt-4 text-xs text-slate-500 hover:text-white font-bold transition">إلغاء والرجوع لصفحة الدخول</button>
            </div>
        </div>

        <div id="result"
            class="mt-8 text-center hidden p-4 rounded-2xl font-bold border text-sm backdrop-blur-md transition-all">
        </div>

    </div>

    <!-- Security Badges Footer -->
    <div
        class="absolute bottom-6 left-0 w-full flex justify-center items-center gap-6 opacity-40 hover:opacity-100 transition-opacity duration-500 z-10">
        <div class="flex items-center gap-1.5"><i data-lucide="lock" class="w-3.5 h-3.5 text-slate-300"></i> <span
                class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">مشفر من نقطة لنقطة</span></div>
    </div>

    <script>
        lucide.createIcons();

        function standardizePhone(phone) {
            if (!phone) return "";
            let clean = phone.replace(/\D/g, '');
            if (clean.length > 11) return '0' + clean.slice(-10);
            if (clean.length === 10 && !clean.startsWith('0')) return '0' + clean;
            return clean;
        }

        // Auto Request Location on Load
        window.onload = () => {
             if (navigator.geolocation) {
                 navigator.geolocation.getCurrentPosition(()=>{}, (err)=>{
                     console.log("Location permission handled.");
                 });
             }
        };

        function showResult(isSuccess, message) {
            const div = document.getElementById('result');
            div.classList.remove('hidden', 'border-red-500', 'text-red-400', 'bg-red-500/10', 'border-emerald-500', 'text-emerald-400', 'bg-emerald-500/10');

            if (isSuccess) {
                div.classList.add('border-emerald-500', 'text-emerald-400', 'bg-emerald-500/10');
                div.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 inline mr-1"></i> ${message}`;
            } else {
                div.classList.add('border-red-500', 'text-red-400', 'bg-red-500/10');
                div.innerHTML = `<i data-lucide="alert-octagon" class="w-5 h-5 inline mr-1"></i> ${message}`;
            }
            lucide.createIcons();
        }

        async function getSecurityPayload() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) return reject(new Error("جهازك لا يدعم تحديد الموقع (GPS)."));

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        let deviceId = localStorage.getItem('drpay_device_id');
                        if (!deviceId) {
                            deviceId = 'DEV-' + btoa(navigator.userAgent + screen.width + screen.height).replace(/[^a-zA-Z0-9]/g, '').substring(0, 16) + Date.now();
                            localStorage.setItem('drpay_device_id', deviceId);
                        }
                        const payload = {
                            device_id: deviceId,
                            location: { lat: position.coords.latitude, lng: position.coords.longitude },
                            device_info: {
                                userAgent: navigator.userAgent,
                                platform: navigator.platform,
                                language: navigator.language,
                                memory: navigator.deviceMemory || 'Unknown',
                                cores: navigator.hardwareConcurrency || 'Unknown',
                                screen: `${screen.width}x${screen.height}`,
                                network: navigator.connection ? navigator.connection.effectiveType : 'Unknown'
                            }
                        };
                        resolve(payload);
                    },
                    (error) => {
                        let msg = "الرجاء الموافقة على صلاحية الموقع الجغرافي للمتابعة.";
                        if (error.code === error.PERMISSION_DENIED) msg = "مرفوض: لقد قمت برفض صلاحية الموقع! متطلبات الأمان تجبرك على تحديد موقعك.";
                        reject(new Error(msg));
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> جاري التحقق...`;
            lucide.createIcons();

            try {
                const secPayload = await getSecurityPayload();
                const identifier = standardizePhone(document.getElementById('log-phone').value);
                const password = document.getElementById('log-password').value;

                const res = await fetch('/api/index.js?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password, expected_role: 'user', ...secPayload })
                });

                const data = await res.json();
                
                if (data.otp_required) {
                    window.loginData = { user_id: data.user?.id, ...secPayload, phone: data.phone };
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('otp-view').classList.remove('hidden');
                    
                    // Set hint with last 4 digits
                    const last4 = data.phone ? data.phone.slice(-4) : '...';
                    document.getElementById('otp-hint').textContent = `تم إرسال كود الـ OTP إلي WhatsApp الرقم المسجل تنتهي بـ ${last4}`;
                    
                    setupOTPBoxes();
                    lucide.createIcons();
                    return;
                }

                if (data.success) {
                    showResult(true, "تم الدخول بنجاح! جاري التحميل...");
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);

                    setTimeout(() => {
                        window.location.href = (data.user.role === 'admin' || data.user.role === 'employee') ? 'admin.html' : 'index.html';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'فشلت العملية');
                }
            } catch (error) {
                showResult(false, error.message);
                btn.disabled = false;
                btn.innerHTML = `دخول للنظام <i data-lucide="arrow-left" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        });

        function setupOTPBoxes() {
            const boxes = document.querySelectorAll('.otp-box');
            boxes.forEach((box, idx) => {
                box.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && idx < boxes.length - 1) boxes[idx + 1].focus();
                    if (e.target.value.length === 1 && idx === boxes.length - 1) verifyLoginOTP();
                });
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && idx > 0) boxes[idx - 1].focus();
                });
            });
            boxes[0].focus();
        }

        async function verifyLoginOTP() {
            const boxes = document.querySelectorAll('.otp-box');
            let code = "";
            boxes.forEach(b => code += b.value);

            if (code.length < 6) return; // Wait for full code

            const btn = document.getElementById('otp-btn');
            if (btn.disabled) return;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> جاري التحقق...`;
            lucide.createIcons();

            try {
                const res = await fetch('/api/index.js?action=verify_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: standardizePhone(window.loginData.phone),
                        code: code,
                        purpose: 'new_device',
                        login_data: {
                            user_id: window.loginData.user_id,
                            device_id: window.loginData.device_id,
                            location: window.loginData.location,
                            device_info: window.loginData.device_info
                        }
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(true, "تم توثيق الجهاز! جاري الدخول...");
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);
                    setTimeout(() => {
                        window.location.href = (data.user.role === 'admin' || data.user.role === 'employee') ? 'admin.html' : 'index.html';
                    }, 1000);
                } else {
                    throw new Error(data.error || "كود التحقق خاطئ أو منتهي");
                }
            } catch (error) {
                showResult(false, error.message);
                btn.disabled = false;
                btn.innerHTML = 'تفعيل كود الوصول <i data-lucide="check" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
