<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول - الدكتور باي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <!-- Background Blobs -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 -right-20 w-80 h-80 bg-blue-600/30 rounded-full blur-[100px] animate-blob"></div>
        <div class="absolute bottom-1/4 -left-20 w-80 h-80 bg-indigo-600/20 rounded-full blur-[100px] animate-blob animation-delay-2000"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-sky-500/10 rounded-full blur-[120px] animate-blob animation-delay-4000"></div>
    </div>

    <div class="w-full max-w-md animate-scale-up">
        <div class="glass-panel p-8 rounded-[3rem] relative overflow-hidden group">
            
            <div id="login-step" class="space-y-8">
                <div class="text-center">
                    <div class="w-20 h-20 bg-white/5 rounded-3xl mx-auto mb-6 flex items-center justify-center border border-white/10 shadow-inner group-hover:scale-110 transition-transform duration-500">
                        <img src="images/logo.png" alt="Logo" class="w-14 h-14 object-contain">
                    </div>
                    <h1 class="text-3xl font-black text-white leading-none mb-2">تسجيل الدخول</h1>
                    <p class="text-slate-400 text-sm font-bold">أهلاً بك مجدداً في الدكتور باي</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <div class="space-y-2">
                        <label class="block text-[8px] text-blue-400 font-black uppercase tracking-[0.2em] px-2">رقم الموبايل</label>
                        <div class="relative">
                            <input type="tel" id="phone" required class="input-glass w-full py-4 px-12 rounded-2xl text-sm font-bold font-mono outline-none" placeholder="01xxxxxxxxx">
                            <i data-lucide="phone" class="absolute right-4 top-4 w-5 h-5 text-slate-500"></i>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-[8px] text-blue-400 font-black uppercase tracking-[0.2em] px-2">كلمة المرور</label>
                        <div class="relative">
                            <input type="password" id="password" required class="input-glass w-full py-4 px-12 rounded-2xl text-sm font-bold outline-none" placeholder="••••••••">
                            <i data-lucide="lock" class="absolute right-4 top-4 w-5 h-5 text-slate-500"></i>
                        </div>
                    </div>

                    <div class="flex items-center justify-between px-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded-md border-white/10 bg-white/5 text-blue-600 focus:ring-blue-500">
                            <span class="text-[10px] text-slate-400 font-bold">تذكر هذا الجهاز</span>
                        </label>
                        <a href="#" class="text-[10px] text-blue-400 font-black hover:text-blue-300 transition">نسيت كلمة السر؟</a>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-900/40 active:scale-95 transition-all text-sm flex items-center justify-center gap-3">
                        دخول للنظام <i data-lucide="arrow-left-circle" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>

            <div id="otp-step" class="space-y-8 hidden">
                <div class="text-center">
                    <div class="w-20 h-20 bg-blue-500/10 rounded-3xl mx-auto mb-6 flex items-center justify-center border border-blue-500/20 shadow-inner">
                        <i data-lucide="shield-check" class="text-blue-400 w-10 h-10"></i>
                    </div>
                    <h2 class="text-2xl font-black text-white mb-2">كود التحقق (OTP)</h2>
                    <p class="text-xs text-slate-400 font-bold">تم إرسال الكود لـ WhatsApp الرقم المسجل ينتهي بـ <span id="phone-display" class="font-mono text-blue-400">...</span></p>
                </div>
                
                <div class="space-y-4">
                    <input type="number" id="otp-code" class="input-glass w-full py-5 text-center text-3xl font-black font-mono tracking-[0.4em] rounded-2xl outline-none" placeholder="000000">
                    <button onclick="verifyOTP()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-emerald-900/20 active:scale-95 transition-all text-sm flex items-center justify-center gap-3">
                        تحقق ودخول <i data-lucide="check-circle" class="w-5 h-5"></i>
                    </button>
                    <button onclick="location.reload()" class="w-full text-slate-500 text-[10px] font-bold">الرجوع لتسجيل الدخول</button>
                </div>
            </div>
            
            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-[10px] text-slate-600 font-bold tracking-widest uppercase">Dr Pay System • v3.2.0 • 2026</p>
            </div>
        </div>
        
        <div class="mt-6 flex justify-center gap-4">
            <button onclick="toggleTheme()" class="text-[10px] font-black text-slate-500 flex items-center gap-2 hover:text-white transition"><i data-lucide="moon" class="w-4 h-4"></i> تغيير المظهر</button>
            <span class="text-slate-700">|</span>
            <a href="tel:01063151472" class="text-[10px] font-black text-blue-500/70 flex items-center gap-2 hover:text-blue-400 transition"><i data-lucide="phone" class="w-4 h-4"></i> دعم الفني</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
