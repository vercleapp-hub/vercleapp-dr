<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr Pay - لوحة التاجر</title>
    
    <!-- Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] hidden" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed right-0 top-0 w-80 h-full bg-slate-900 border-l border-white/5 z-[100] p-6 overflow-y-auto transform translate-x-full transition-transform duration-500 shadow-2xl shadow-black/80">
        <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center p-1 shadow-lg shadow-blue-500/20">
                    <img src="images/logo.png" class="w-7 h-7 object-contain">
                </div>
                <div>
                    <h2 class="text-white font-black text-lg leading-none">الدكتور باي</h2>
                    <p class="text-[10px] text-emerald-400 font-mono font-black mt-1" id="side-balance">... ج.م</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white transition bg-slate-800/50 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="space-y-4 mb-8">
            <div class="bg-slate-800/50 p-4 rounded-3xl border border-white/5">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 mr-1">بحث سريع بالعمليات</p>
                <div class="relative">
                    <input type="text" id="side-trans-search" placeholder="الفاتورة - الرقم - اسم العميل..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-10 py-3 text-xs text-white outline-none focus:border-blue-500 transition-all font-bold">
                    <i data-lucide="search" class="absolute right-3 top-3 w-4 h-4 text-slate-600"></i>
                </div>
            </div>
        </div>

        <div class="space-y-1 mb-8">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 mr-3">القائمة الرئيسية</p>
            <nav class="space-y-2">
                <button onclick="openView('home')" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-blue-600 text-white font-black text-sm shadow-xl shadow-blue-900/20"><i data-lucide="home" class="w-5 h-5"></i> الصفحة الرئيسية</button>
                <button onclick="openView('wallet')" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition font-black text-sm"><i data-lucide="wallet" class="w-5 h-5 text-emerald-400"></i> شحن المحفظة</button>
                <button onclick="openView('reports')" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition font-black text-sm"><i data-lucide="file-text" class="w-5 h-5 text-indigo-400"></i> سجل العمليات</button>
                <button onclick="openView('settings')" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition font-black text-sm"><i data-lucide="settings" class="w-5 h-5 text-slate-400"></i> الإعدادات</button>
            </nav>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5 text-center">
            <div class="bg-blue-600/10 p-4 rounded-3xl border border-blue-500/20">
                <h4 class="text-white text-sm font-black mb-1">الدعم الفني</h4>
                <p class="text-blue-400 font-mono text-sm font-black">01063151472</p>
            </div>
            <p class="text-[9px] text-slate-600 mt-4 font-bold tracking-widest uppercase">DR PAY v3.2.0 • ELDOCTOR</p>
        </div>
    </aside>

    <!-- HEADER CONTENT -->
    <header id="main-header" class="glass-header p-2.5 px-4 rounded-b-3xl shadow-lg fixed top-0 w-full z-40 border-b border-white/5 transition-all duration-300">
        <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 bg-slate-900/40 border border-white/5 rounded-xl flex items-center justify-center text-blue-300 active:scale-90 transition shadow-inner">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex flex-col">
                    <span class="text-white font-black text-xs" id="header-shop-name">...</span>
                    <span class="text-[8px] text-blue-400 font-bold" id="user-role-badge">تاجر</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="bg-emerald-500/10 border border-emerald-500/20 px-4 py-1.5 rounded-xl flex items-center gap-2">
                    <p class="text-sm font-black text-emerald-400 font-mono" id="user-balance">0.00</p>
                </div>
            </div>
        </div>
        
        <div class="relative px-1">
            <input type="text" id="quick-search" placeholder="ابحث باسم الخدمة..." class="w-full bg-slate-950/40 text-sm py-2.5 px-10 rounded-xl text-white border border-white/5 font-bold outline-none focus:border-blue-500/50">
            <i data-lucide="search" class="absolute right-4 top-3 w-4 h-4 text-blue-500/40"></i>
        </div>
    </header>

    <main class="mt-[110px] px-4 pb-24" id="main-content">
        <!-- Dashboard View -->
        <div id="view-home" class="space-y-6">
            <!-- Favorites Section -->
            <div id="favorites-section" class="hidden space-y-3">
                <h3 class="font-black text-[10px] text-blue-400 flex items-center gap-2 px-1 mb-2 uppercase tracking-widest"><i data-lucide="star" class="w-4 h-4 fill-blue-500"></i> الخدمات المفضلة</h3>
                <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-3" id="favorites-grid"></div>
                <div class="h-px bg-white/5 my-2"></div>
            </div>

            <div class="flex justify-between items-center px-1">
                <h2 class="font-black text-lg text-white flex items-center gap-2 px-1"><i data-lucide="layout-grid" class="text-blue-500 w-5 h-5"></i> أقسام الخدمات</h2>
                <button onclick="openServicesModal('كل الخدمات')" class="text-blue-400 text-[10px] font-black bg-blue-500/5 px-4 py-1.5 rounded-xl border border-blue-500/10 active:scale-95">الكل</button>
            </div>
            
            <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-3" id="categories-grid"></div>
        </div>

        <!-- Wallet View -->
        <div id="view-wallet" class="hidden-view space-y-6">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 shadow-xl text-center text-white relative overflow-hidden">
                <i data-lucide="arrow-down-circle" class="absolute -right-4 -top-4 w-32 h-32 opacity-10"></i>
                <h2 class="text-xl font-black mb-1">شحن الرصيد</h2>
                <p class="text-blue-100 text-xs">قم بتحويل المبلغ وسجل الطلب للموافقة الفورية</p>
            </div>
            <!-- Wallet form placeholder -->
        </div>

        <!-- Reports View -->
        <div id="view-reports" class="hidden-view space-y-4">
             <div class="flex justify-between items-center px-1"><h2 class="font-black text-lg text-white">سجل العمليات</h2></div>
             <div id="reports-list" class="space-y-3"></div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="hidden-view space-y-4">
            <div class="bg-slate-800/50 p-6 rounded-[2.5rem] border border-white/5 mb-6 text-center">
                <div class="w-16 h-16 rounded-[1.8rem] bg-blue-500/10 mx-auto mb-4 flex items-center justify-center text-blue-400 shadow-inner"><i data-lucide="user" class="w-8 h-8"></i></div>
                <h3 id="sett-profile-name" class="text-xl font-black text-white">...</h3>
            </div>
            <div class="grid grid-cols-1 gap-3 px-1" id="settings-menu">
                <button onclick="openSettingsSub('profile')" class="bg-slate-800/50 p-5 rounded-[2rem] border border-white/5 flex items-center justify-between text-white active:scale-95 transition">
                    <div class="flex items-center gap-4"><div class="w-10 h-10 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400"><i data-lucide="user-plus" class="w-5 h-5"></i></div> <span class="text-sm font-black">بيانات الحساب</span></div>
                    <i data-lucide="chevron-left" class="w-4 h-4 text-slate-500"></i>
                </button>
                <button onclick="openSettingsSub('security')" class="bg-slate-800/50 p-5 rounded-[2rem] border border-white/5 flex items-center justify-between text-white active:scale-95 transition">
                    <div class="flex items-center gap-4"><div class="w-10 h-10 rounded-2xl bg-yellow-500/10 flex items-center justify-center text-yellow-400"><i data-lucide="shield-check" class="w-5 h-5"></i></div> <span class="text-sm font-black">الأمان والحماية</span></div>
                    <i data-lucide="chevron-left" class="w-4 h-4 text-slate-500"></i>
                </button>
                <button onclick="openSettingsSub('devices')" class="bg-slate-800/50 p-5 rounded-[2rem] border border-white/5 flex items-center justify-between text-white active:scale-95 transition">
                    <div class="flex items-center gap-4"><div class="w-10 h-10 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400"><i data-lucide="smartphone" class="w-5 h-5"></i></div> <span class="text-sm font-black">الأجهزة المسجلة</span></div>
                    <i data-lucide="chevron-left" class="w-4 h-4 text-slate-500"></i>
                </button>
                <button onclick="openView('add-merch')" class="dist-only hidden bg-slate-800/50 p-5 rounded-[2rem] border border-white/5 flex items-center justify-between text-white active:scale-95 transition">
                    <div class="flex items-center gap-4"><div class="w-10 h-10 rounded-2xl bg-amber-500/10 flex items-center justify-center text-amber-400"><i data-lucide="user-plus" class="w-5 h-5"></i></div> <span class="text-sm font-black">إضافة تاجر جديد</span></div>
                    <i data-lucide="chevron-left" class="w-4 h-4 text-slate-500"></i>
                </button>
                <button onclick="openView('support')" class="bg-slate-800/50 p-5 rounded-[2rem] border border-white/5 flex items-center justify-between text-white active:scale-95 transition">
                    <div class="flex items-center gap-4"><div class="w-10 h-10 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400"><i data-lucide="help-circle" class="w-5 h-5"></i></div> <span class="text-sm font-black">تذاكر الدعم</span></div>
                    <i data-lucide="chevron-left" class="w-4 h-4 text-slate-500"></i>
                </button>
                <button onclick="refreshSystem()" id="refresh-system-btn" class="w-full bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 font-black py-5 rounded-[1.8rem] transition flex items-center justify-center gap-3 border border-blue-500/10 active:scale-95 shadow-lg">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    تحديث الخدمات والنظام
                </button>

                <button onclick="logout()" class="bg-red-500/10 p-5 rounded-[2rem] border border-red-500/20 flex items-center justify-between text-red-500 mt-4 active:scale-95 transition shadow-xl shadow-red-900/10">
                    <div class="flex items-center gap-4"><i data-lucide="log-out" class="w-5 h-5"></i> <span class="text-sm font-black">تسجيل الخروج</span></div>
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- Sub-pages for devices and security injected via JS -->
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="openView('home')" id="nav-home" class="nav-btn active flex flex-col items-center"><i data-lucide="layout-grid" class="w-6 h-6"></i><span>الرئيسية</span></button>
        <button onclick="openView('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center"><i data-lucide="wallet" class="w-6 h-6"></i><span>المحفظة</span></button>
        <button onclick="openView('reports')" id="nav-reports" class="nav-btn flex flex-col items-center"><i data-lucide="file-text" class="w-6 h-6"></i><span>التقارير</span></button>
        <button onclick="openView('settings')" id="nav-settings" class="nav-btn flex flex-col items-center"><i data-lucide="settings" class="w-6 h-6"></i><span>الإعدادات</span></button>
    </nav>

    <!-- Hidden Modals (Payment, Receipt, Services) - simplified for clean view -->
    <div id="services-modal" class="fixed inset-0 bg-slate-900/95 z-50 flex items-end justify-center hidden pt-10">
        <div class="bg-slate-800 w-full max-w-md rounded-t-[2.5rem] p-6 h-[85vh] flex flex-col border-t border-white/10 shadow-2xl overflow-hidden">
             <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4"></div>
             <div class="flex justify-between items-center mb-4"><h3 id="modal-title" class="text-white font-black">الخدمات</h3> <button onclick="closeServicesModal()" class="text-slate-400 p-2"><i data-lucide="x" class="w-5 h-5"></i></button></div>
             <div class="mb-4 relative"><input type="text" id="service-search" oninput="renderServices()" placeholder="ابحث عن خدمة..." class="w-full bg-slate-900 border-none rounded-2xl p-4 text-white text-sm outline-none focus:ring-2 focus:ring-blue-500 font-bold"><i data-lucide="search" class="absolute right-4 top-4 text-slate-500 w-4 h-4"></i></div>
             <div id="services-grid" class="flex-1 overflow-y-auto grid grid-cols-3 gap-3"></div>
        </div>
    </div>

    <!-- Final Scripts -->
    <script src="app.js"></script>
</body>
</html>
