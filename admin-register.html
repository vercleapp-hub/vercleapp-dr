<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكتور باي - تسجيل مسؤول جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #020617; color: #f8fafc; }
        .admin-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255, 215, 0, 0.15); box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8); }
        .admin-input { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 215, 0, 0.1); transition: all 0.3s ease; }
        .admin-input:focus { border-color: #fbbf24; background: rgba(30, 41, 59, 0.9); box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-slate-950">

    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-amber-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-xl admin-glass rounded-[3rem] p-8 sm:p-12 relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-white mb-2">تسجيل عضوية إدارية</h1>
            <p class="text-xs text-amber-500 font-bold uppercase tracking-widest">Admin Authorization Portal</p>
        </div>

        <form id="admin-reg-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 mr-1 tracking-widest">الاسم الكامل</label>
                    <input type="text" id="name" required class="w-full admin-input rounded-2xl px-5 py-4 text-sm outline-none text-white shadow-inner" placeholder="مثال: عمر منصور">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 mr-1 tracking-widest">رقم الهاتف (الواتساب)</label>
                    <input type="tel" id="phone" required class="w-full admin-input rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono shadow-inner" placeholder="010XXXXXXXX">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 mr-1 tracking-widest">البريد الإلكتروني</label>
                    <input type="email" id="email" required class="w-full admin-input rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono shadow-inner" placeholder="admin@drpay.com">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 mr-1 tracking-widest">الرقم القومي</label>
                    <input type="text" id="nid" required maxlength="14" class="w-full admin-input rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono shadow-inner" placeholder="29010...">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 mr-1 tracking-widest">كلمة المرور القوية</label>
                    <input type="password" id="password" required class="w-full admin-input rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono shadow-inner" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-amber-600/80 uppercase mb-2 mr-1 tracking-widest">كود التسجيل السري (Secret Code)</label>
                    <input type="password" id="secret_code" required class="w-full admin-input border-amber-600/40 rounded-2xl px-5 py-4 text-sm outline-none text-white font-mono shadow-inner" placeholder="P-XXXX-XXXX">
                </div>
            </div>

            <button type="submit" id="reg-btn" class="w-full bg-gradient-to-r from-amber-600 to-yellow-500 hover:from-amber-500 hover:to-yellow-400 text-slate-950 font-black py-5 rounded-2xl transition-all shadow-xl shadow-amber-900/30 active:scale-95 flex items-center justify-center gap-3 mt-4">
                تأكيد التسجيل كمسؤول نظام <i data-lucide="shield-plus" class="w-5 h-5"></i>
            </button>
        </form>

        <div id="otp-view" class="hidden space-y-8 text-center animate-in slide-in-from-bottom duration-500">
            <div class="w-20 h-20 bg-amber-500/10 rounded-[2rem] flex items-center justify-center mx-auto border border-amber-500/20">
                <i data-lucide="message-circle" class="text-amber-500 w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-white">تأكيد رقم الإدارة</h2>
            <p class="text-sm text-slate-400">يرجى إدخال الكود المرسل للواتساب الخاص بك لإتمام توثيق المسؤول.</p>
            <input type="text" id="otp-code" maxlength="6" class="w-full text-center tracking-[1.5rem] py-5 bg-slate-950 rounded-2xl border border-amber-500/30 text-3xl font-black text-amber-500 outline-none" placeholder="000000">
            <button onclick="verifyOTP()" id="otp-btn" class="w-full bg-amber-600 text-white font-black py-5 rounded-2xl shadow-2xl shadow-amber-900/40 hover:bg-amber-500 transition-all">تفعيل الحساب الإداري</button>
        </div>

        <div id="result" class="mt-10 text-center hidden p-5 rounded-2xl text-xs font-bold border backdrop-blur-md"></div>

        <div class="mt-10 text-center">
            <a href="admin-login.html" class="text-slate-500 hover:text-amber-500 text-xs font-bold transition flex items-center justify-center gap-2">
                <i data-lucide="arrow-right" class="w-4 h-4"></i> العودة لتسجيل الدخول
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        window.registrationData = null;

        function showResult(success, msg) {
            const r = document.getElementById('result');
            r.className = `mt-10 text-center p-5 rounded-2xl text-xs font-bold border backdrop-blur-md ${success ? 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400' : 'bg-red-500/10 border-red-500/50 text-red-400'}`;
            r.textContent = msg;
            r.classList.remove('hidden');
        }

        document.getElementById('admin-reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="refresh-cw" class="animate-spin w-5 h-5"></i> جاري التحقق...`;
            lucide.createIcons();

            const payload = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                national_id: document.getElementById('nid').value,
                secret_code: document.getElementById('secret_code').value
            };

            try {
                const res = await fetch('/api/index.js?action=register_admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.otp_required) {
                    window.registrationData = payload;
                    document.getElementById('admin-reg-form').classList.add('hidden');
                    document.getElementById('otp-view').classList.remove('hidden');
                    showResult(true, "تم إرسال كود التفعيل للواتساب");
                } else if (!data.success) {
                    throw new Error(data.error);
                } else {
                    showResult(true, "تم تسجيل حساب المسؤول بنجاح");
                    setTimeout(() => window.location.href = 'admin-login.html', 1500);
                }
            } catch (err) {
                showResult(false, err.message);
                btn.disabled = false;
                btn.innerHTML = `تأكيد التسجيل كمسؤول نظام <i data-lucide="shield-plus" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        });

        async function verifyOTP() {
            const btn = document.getElementById('otp-btn');
            btn.disabled = true; btn.textContent = 'جاري التوثيق النهائي...';
            
            try {
                const res = await fetch('/api/index.js?action=verify_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: window.registrationData.phone,
                        code: document.getElementById('otp-code').value,
                        purpose: 'register_admin',
                        registration_data: { ...window.registrationData, role: 'admin' }
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(true, "🎉 ممتاز! تم تفعيل هويتك كمسؤول للنظام.");
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);
                    setTimeout(() => window.location.href = 'admin.html', 1500);
                } else {
                    throw new Error(data.error || "الكود غير صحيح");
                }
            } catch (err) {
                showResult(false, err.message);
                btn.disabled = false; btn.textContent = 'تفعيل الحساب الإداري';
            }
        }
    </script>
</body>
</html>
