<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الدكتور باي - إنشاء حساب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .input-glass:focus { background: rgba(30, 41, 59, 0.8); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="fixed inset-0 w-full h-full overscroll-none overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 md:w-96 md:h-96 bg-emerald-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 md:w-96 md:h-96 bg-teal-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[20%] left-[20%] w-56 h-56 md:w-80 md:h-80 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <div class="w-full max-w-lg glass-panel rounded-3xl p-6 sm:p-10 relative z-10 max-h-[95vh] overflow-y-auto">
        
        <div class="text-center mb-8 relative z-10 flex flex-col items-center">
            <div class="relative mb-4">
                <div class="absolute inset-0 bg-emerald-500 rounded-full blur-[20px] opacity-50 animate-pulse"></div>
                <div class="w-20 h-20 rounded-[1.5rem] flex items-center justify-center shadow-lg shadow-emerald-500/20 relative z-10 border border-white/20 overflow-hidden">
                    <img src="logo/logo.png" alt="Dr Pay Logo" class="w-full h-full object-contain text-white">
                </div>
            </div>
            <h1 class="text-2xl font-black text-white mb-1">فتح حساب تاجر جديد</h1>
            <p id="step-desc" class="text-xs text-slate-400 font-bold">يرجى إدخال البيانات الأساسية للبدء</p>
        </div>

        <!-- STEP 1: INITIAL CHECK -->
        <form id="step1-form" class="space-y-5 relative z-10">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-700/50 space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-2">رقم الهاتف المحمول <span class="text-red-400">*</span></label>
                    <input type="tel" id="reg-phone" required class="w-full input-glass rounded-xl px-4 py-4 text-base outline-none text-white font-mono tracking-widest" placeholder="01012345678">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-2">الرقم القومي (14 رقم) <span class="text-red-400">*</span></label>
                    <input type="text" id="reg-nid" required maxlength="14" minlength="14" class="w-full input-glass rounded-xl px-4 py-4 text-base outline-none text-white font-mono tracking-widest" placeholder="29010...">
                </div>
            </div>
            <button type="submit" id="step1-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl transition shadow-xl active:scale-95 flex items-center justify-center gap-2">
                تحقق من البيانات والمتابعة <i data-lucide="arrow-left"></i>
            </button>
        </form>

        <!-- STEP 2: FULL FORM -->
        <form id="step2-form" class="hidden space-y-5 relative z-10 animate-fade-in pb-4">
            <div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-700/50 space-y-4">
                <div class="flex items-center gap-2 mb-2 p-2 bg-emerald-500/10 rounded-xl border border-emerald-500/20">
                    <i data-lucide="shield-check" class="text-emerald-400 w-4 h-4"></i>
                    <p class="text-[10px] text-emerald-400 font-black">البيانات متاحة، يرجى إكمال باقي الملف</p>
                </div>
                
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5">الاسم الرباعي <span class="text-red-400">*</span></label>
                    <input type="text" id="reg-name" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">رقم الواتساب <span class="text-red-400">*</span></label>
                        <input type="tel" id="reg-whatsapp" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono" placeholder="01...">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">المحافظة (تلقائي)</label>
                        <input type="text" id="reg-province" readonly class="w-full bg-slate-800/50 rounded-xl px-4 py-3 text-sm text-blue-400 font-bold border border-white/5 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5">البريد الإلكتروني <span class="text-red-400">*</span></label>
                    <input type="email" id="reg-email" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5">العنوان التفصيلي <span class="text-red-400">*</span></label>
                    <input type="text" id="reg-address" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white" placeholder="الشارع - رقم العمارة - الدور">
                </div>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-700/50 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">اسم النشاط / المحل <span class="text-red-400">*</span></label>
                        <input type="text" id="reg-shop-name" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">عنوان النشاط <span class="text-red-400">*</span></label>
                        <input type="text" id="reg-shop-address" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5">تعيين كلمة المرور <span class="text-red-400">*</span></label>
                    <input type="password" id="reg-password" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono" placeholder="••••••••">
                </div>
            </div>

            <div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-700/50 space-y-4">
                <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest text-center">صور البطاقة الشخصية</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <div id="cam-box-front" class="relative group h-32 rounded-xl overflow-hidden bg-slate-800 border-2 border-dashed border-slate-600 flex items-center justify-center cursor-pointer" onclick="openCamera('id-front')">
                            <img id="prev-id-front" class="absolute inset-0 w-full h-full object-cover hidden">
                            <div id="icon-id-front" class="text-center">
                                <i data-lucide="camera" class="w-6 h-6 mx-auto mb-1 text-slate-500"></i>
                                <span class="text-[9px] font-bold text-slate-400">وجه البطاقة</span>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div id="cam-box-back" class="relative group h-32 rounded-xl overflow-hidden bg-slate-800 border-2 border-dashed border-slate-600 flex items-center justify-center cursor-pointer" onclick="openCamera('id-back')">
                            <img id="prev-id-back" class="absolute inset-0 w-full h-full object-cover hidden">
                            <div id="icon-id-back" class="text-center">
                                <i data-lucide="camera" class="w-6 h-6 mx-auto mb-1 text-slate-500"></i>
                                <span class="text-[9px] font-bold text-slate-400">ظهر البطاقة</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" id="reg-btn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-black py-4 rounded-2xl transition shadow-xl active:scale-95 flex items-center justify-center gap-2">
                إرسال الحساب للمراجعة <i data-lucide="check-circle" class="w-5 h-5"></i>
            </button>
        </form>

        <!-- CAMERA MODAL -->
        <div id="cam-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex flex-col items-center justify-center p-4">
            <video id="video-stream" autoplay playsinline class="w-full max-w-sm rounded-[2rem] border-2 border-white/20 shadow-2xl overflow-hidden bg-slate-900"></video>
            <div class="mt-8 flex gap-4 items-center">
                <button onclick="closeCamera()" class="bg-slate-800 text-white p-4 rounded-full border border-white/10 hover:bg-slate-700 transition" title="إلغاء">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <button onclick="takeSnapshot()" class="bg-emerald-500 text-white p-6 rounded-full shadow-2xl transform active:scale-90 transition hover:bg-emerald-400" title="التقاط صورة">
                    <i data-lucide="camera" class="w-8 h-8"></i>
                </button>
                <button onclick="document.getElementById('file-input').click()" class="bg-blue-600 text-white p-4 rounded-full border border-white/10 hover:bg-blue-500 transition" title="رفع من الملفات">
                    <i data-lucide="upload" class="w-6 h-6"></i>
                </button>
            </div>
            <p class="mt-4 text-xs text-slate-400 font-bold">ضع البطاقة داخل الإطار أو اختر صورة من جهازك</p>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <!-- OTP VIEW -->
        <div id="otp-view" class="hidden space-y-6 relative z-10 animate-fade-in text-center">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-emerald-500/20 shadow-inner">
                <i data-lucide="message-square" class="text-emerald-400 w-10 h-10"></i>
            </div>
            <h2 class="text-xl font-black text-white">تأكيد رقم الهاتف</h2>
            <p class="text-xs text-slate-400 leading-relaxed px-6">أدخل كود التحقق المرسل إلى الواتساب الخاص بك لإتمام عملية التسجيل وتفعيل حسابك.</p>
            <input type="text" id="otp-code" maxlength="6" class="w-full text-center tracking-[1rem] py-5 bg-slate-900 rounded-2xl border border-slate-700 text-3xl font-black text-emerald-400 outline-none focus:border-emerald-500 transition-all shadow-inner" placeholder="000000">
            <button onclick="verifyOTP()" id="otp-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl transition shadow-xl active:scale-95">تأكيد الرمز وإتمام التسجيل</button>
        </div>

        <div id="result" class="mt-6 text-center hidden p-4 rounded-xl font-bold border text-sm backdrop-blur-md transition-all"></div>
    </div>

    <!-- HIDDEN CANVAS FOR CAMERA CAPTURE -->
    <canvas id="cam-canvas" class="hidden" width="1080" height="720"></canvas>
    
    <script>
        lucide.createIcons();
        window.registrationData = {};
        let currentTarget = null;
        let stream = null;

        // Auto Request Location on Load
        window.onload = () => {
             if (navigator.geolocation) {
                 navigator.geolocation.getCurrentPosition(()=>{}, (err)=>{
                     alert("يرجى الموافقة على صلاحية الموقع لفتح حساب تاجر.");
                 });
             }
        };

        function getProvinceFromNID(nid) {
            if (nid.length < 9) return "";
            const code = nid.substring(7, 9);
            const mapping = {
                '01': 'القاهرة', '02': 'الإسكندرية', '03': 'بورسعيد', '04': 'السويس',
                '11': 'دمياط', '12': 'الدقهلية', '13': 'الشرقية', '14': 'القليوبية',
                '15': 'كفر الشيخ', '16': 'الغربية', '17': 'المنوفية', '18': 'البحيرة',
                '19': 'الإسماعيلية', '21': 'الجيزة', '22': 'بني سويف', '23': 'الفيوم',
                '24': 'المنيا', '25': 'أسيوط', '26': 'سوهاج', '27': 'قنا',
                '28': 'أسوان', '29': 'الأقصر', '31': 'البحر الأحمر', '32': 'الوادي الجديد',
                '33': 'مطروح', '34': 'شمال سيناء', '35': 'جنوب سيناء', '88': 'خارج مصر'
            };
            return mapping[code] || "غير محدد";
        }

        document.getElementById('step1-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('reg-phone').value;
            const nid = document.getElementById('reg-nid').value;
            const btn = document.getElementById('step1-btn');
            
            btn.disabled = true; btn.innerHTML = 'جاري التحقق...';
            
            try {
                const res = await fetch(`/api/index.js?action=check_user_existence`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ phone, national_id: nid })
                });
                const data = await res.json();
                if (data.success) {
                    window.registrationData.phone = phone;
                    window.registrationData.national_id = nid;
                    window.registrationData.province = getProvinceFromNID(nid);
                    document.getElementById('reg-province').value = window.registrationData.province;
                    
                    document.getElementById('step1-form').classList.add('hidden');
                    document.getElementById('step2-form').classList.remove('hidden');
                    document.getElementById('step-desc').textContent = "أهلاً بك، يرجى استكمال باقي التفاصيل بدقة";
                    lucide.createIcons();
                } else throw new Error(data.error);
            } catch(err) {
                alert(err.message);
            } finally {
                btn.disabled = false; btn.innerHTML = 'تحقق من البيانات والمتابعة <i data-lucide="arrow-left"></i>';
                lucide.createIcons();
            }
        });

        // Camera Logic
        async function openCamera(target) {
            currentTarget = target;
            document.getElementById('cam-modal').classList.remove('hidden');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video-stream').srcObject = stream;
            } catch(err) {
                alert("لم نستطع فتح الكاميرا. يرجى التأكد من الصلاحيات.");
                closeCamera();
            }
        }
        function closeCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-modal').classList.add('hidden');
        }
        function takeSnapshot() {
            const video = document.getElementById('video-stream');
            const canvas = document.getElementById('cam-canvas');
            const img = document.getElementById('prev-' + currentTarget);
            const icon = document.getElementById('icon-' + currentTarget);
            
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            
            img.src = dataUrl;
            img.classList.remove('hidden');
            if(icon) icon.classList.add('hidden');
            window.registrationData[currentTarget.replace('-','_')] = dataUrl;
            
            closeCamera();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('prev-' + currentTarget);
                const icon = document.getElementById('icon-' + currentTarget);
                
                img.src = e.target.result;
                img.classList.remove('hidden');
                if(icon) icon.classList.add('hidden');
                window.registrationData[currentTarget.replace('-','_')] = e.target.result;
                
                closeCamera();
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('step2-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            if(!window.registrationData.id_front || !window.registrationData.id_back) return alert("يرجى التقاط صورة البطاقة وجه وخلف.");
            
            btn.disabled = true; btn.innerHTML = 'جاري تسجيل الطلب...';
            
            try {
                // Get Location
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {timeout: 10000});
                });
                
                const finalData = {
                    ...window.registrationData,
                    name: document.getElementById('reg-name').value,
                    whatsapp_number: document.getElementById('reg-whatsapp').value,
                    email: document.getElementById('reg-email').value,
                    address: document.getElementById('reg-address').value,
                    shop_name: document.getElementById('reg-shop-name').value,
                    shop_address: document.getElementById('reg-shop-address').value,
                    password: document.getElementById('reg-password').value,
                    location: { lat: pos.coords.latitude, lng: pos.coords.longitude }
                };

                const res = await fetch('/api/index.js?action=register', {
                    method: 'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify(finalData)
                });
                const data = await res.json();
                
                if (data.otp_required) {
                    window.finalRegistrationData = finalData;
                    document.getElementById('step2-form').classList.add('hidden');
                    document.getElementById('otp-view').classList.remove('hidden');
                    document.getElementById('step-desc').textContent = "أنت على بعد خطوة واحدة من تفعيل حسابك";
                } else throw new Error(data.error || 'فشلت العملية');
            } catch(err) {
                alert(err.message);
            } finally {
                btn.disabled = false; btn.innerHTML = 'إرسال الحساب للمراجعة <i data-lucide="check-circle" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        });

        async function verifyOTP() {
            const code = document.getElementById('otp-code').value;
            const btn = document.getElementById('otp-btn');
            btn.disabled = true; btn.textContent = 'جاري التحقق...';
            try {
                const res = await fetch('/api/index.js?action=verify_otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: window.finalRegistrationData.phone,
                        code: code,
                        purpose: 'register',
                        registration_data: window.finalRegistrationData
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert("تم التسجيل وفتح الحساب بنجاح! جاري توجيهك...");
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);
                    window.location.href = 'index.html';
                } else throw new Error(data.error);
            } catch(err) {
                alert(err.message);
                btn.disabled = false; btn.textContent = 'تأكيد الرمز وإتمام التسجيل';
            }
        }
    </script>
</body>
</html>
