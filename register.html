<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الدكتور باي - إنشاء حساب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .input-glass:focus { background: rgba(30, 41, 59, 0.8); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="fixed inset-0 w-full h-full overscroll-none overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 md:w-96 md:h-96 bg-emerald-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 md:w-96 md:h-96 bg-teal-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[20%] left-[20%] w-56 h-56 md:w-80 md:h-80 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <div class="w-full max-w-lg glass-panel rounded-3xl p-6 sm:p-10 relative z-10 max-h-[95vh] overflow-y-auto">
        
        <div class="text-center mb-8 relative z-10 flex flex-col items-center">
            <div class="relative mb-4">
                <div class="absolute inset-0 bg-emerald-500 rounded-full blur-[20px] opacity-50 animate-pulse"></div>
                <div class="w-20 h-20 rounded-[1.5rem] flex items-center justify-center shadow-lg shadow-emerald-500/20 relative z-10 border border-white/20 overflow-hidden">
                    <img src="logo/logo.png" alt="Dr Pay Logo" class="w-full h-full object-contain">
                </div>
            </div>
            <h1 class="text-2xl font-black text-white mb-1">إنشاء حساب تاجر</h1>
        </div>

        <form id="register-form" class="space-y-5 relative z-10">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5">الاسم بالكامل <span class="text-red-400">*</span></label>
                    <input type="text" id="reg-name" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">الرقم القومي (14 رقم) <span class="text-red-400">*</span></label>
                        <input type="text" id="reg-nid" required maxlength="14" minlength="14" class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono tracking-widest" placeholder="29010...">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">العنوان بالتفصيل <span class="text-red-400">*</span></label>
                        <input type="text" id="reg-address" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white" placeholder="المحافظة - المركز - الشارع">
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">رقم المحمول <span class="text-red-400">*</span></label>
                        <input type="tel" id="reg-phone" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono tracking-widest" placeholder="010...">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5">البريد الإلكتروني <span class="text-red-400">*</span></label>
                        <input type="email" id="reg-email" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono" placeholder="name@drpay.com">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5">كلمة المرور <span class="text-red-400">*</span></label>
                    <div class="relative">
                        <input type="password" id="reg-password" onkeyup="checkPassStrength(this.value)" required class="w-full input-glass rounded-xl px-4 py-3 text-sm outline-none text-white font-mono" placeholder="••••••••">
                        <button type="button" onclick="togglePassword('reg-password')" class="absolute left-3 top-3 text-slate-400 hover:text-white transition-colors"><i data-lucide="eye" class="w-4 h-4"></i></button>
                    </div>
                    <div id="pass-strength" class="text-[10px] mt-1.5 font-bold transition-colors hidden flex items-center gap-1">
                        <div class="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden flex-1"><div id="pass-bar" class="h-full bg-red-500 w-1/3 transition-all"></div></div>
                        <span id="pass-msg" class="w-24 text-left">ضعيفة</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="border-2 border-dashed border-slate-600 bg-slate-800/80 rounded-xl p-3 text-center cursor-pointer hover:border-blue-400 transition-colors relative overflow-hidden group h-32 flex flex-col items-center justify-center">
                        <input type="file" id="reg-id-front" accept="image/jpeg, image/png, image/webp" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="previewImage(this, 'preview-front')">
                        <div class="text-slate-400 group-hover:text-blue-400 transition" id="preview-front-icon">
                            <i data-lucide="image-plus" class="w-6 h-6 mx-auto mb-2 opacity-70"></i>
                            <p class="text-[10px] font-black">صورة البطاقة (الوجه)</p>
                        </div>
                        <img id="preview-front" class="absolute inset-0 w-full h-full object-cover hidden">
                        <div class="absolute inset-0 bg-black/50 items-center justify-center hidden group-hover:flex z-0" id="preview-front-hover"><i data-lucide="edit-3" class="text-white w-5 h-5"></i></div>
                    </div>
                    <div class="border-2 border-dashed border-slate-600 bg-slate-800/80 rounded-xl p-3 text-center cursor-pointer hover:border-blue-400 transition-colors relative overflow-hidden group h-32 flex flex-col items-center justify-center">
                        <input type="file" id="reg-id-back" accept="image/jpeg, image/png, image/webp" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="previewImage(this, 'preview-back')">
                        <div class="text-slate-400 group-hover:text-blue-400 transition" id="preview-back-icon">
                            <i data-lucide="image-plus" class="w-6 h-6 mx-auto mb-2 opacity-70"></i>
                            <p class="text-[10px] font-black">صورة البطاقة (الظهر)</p>
                        </div>
                        <img id="preview-back" class="absolute inset-0 w-full h-full object-cover hidden">
                        <div class="absolute inset-0 bg-black/50 items-center justify-center hidden group-hover:flex z-0" id="preview-back-hover"><i data-lucide="edit-3" class="text-white w-5 h-5"></i></div>
                    </div>
                </div>
            </div>
            
            <button type="submit" id="reg-btn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-black py-4 rounded-2xl transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] active:scale-95 flex items-center justify-center gap-2">
                إرسال الحساب للمراجعة <i data-lucide="check-circle" class="w-5 h-5"></i>
            </button>

            <div class="text-center mt-4">
                <a href="login.html" class="text-[11px] font-bold text-slate-400 hover:text-white transition">لديك حساب بالفعل؟ تسجيل الدخول</a>
            </div>
        </form>

        <!-- OTP VIEW -->
        <div id="otp-view" class="hidden space-y-6 relative z-10 animate-fade-in text-center">
            <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                <i data-lucide="message-square" class="text-blue-400 w-8 h-8"></i>
            </div>
            <h2 class="text-xl font-black text-white">تأكيد رقم الهاتف</h2>
            <p class="text-xs text-slate-400 leading-relaxed">أدخل كود التحقق (6 أرقام) الذي تم إرساله إلى الواتساب الخاص بك لإتمام عملية التسجيل.</p>
            
            <input type="text" id="otp-code" maxlength="6" class="w-full text-center tracking-[1rem] py-4 bg-slate-900 rounded-2xl border border-slate-700 text-2xl font-black text-blue-400 outline-none focus:border-blue-500 transition-all" placeholder="000000">
            
            <button onclick="verifyOTP()" id="otp-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-95">تأكيد الرمز وإتمام التسجيل</button>
            <button onclick="location.reload()" class="text-xs text-slate-500 hover:text-white font-bold transition">رجوع لتعديل البيانات</button>
        </div>

        <div id="result" class="mt-6 text-center hidden p-4 rounded-xl font-bold border text-sm backdrop-blur-md transition-all"></div>
    </div>
    
    <script>
        lucide.createIcons();
        window.registrationData = null;

        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function checkPassStrength(val) {
            const ind = document.getElementById('pass-strength');
            const msg = document.getElementById('pass-msg');
            const bar = document.getElementById('pass-bar');
            ind.classList.remove('hidden');
            if (val.length === 0) { ind.classList.add('hidden'); return; }
            if (val.length < 6) { msg.className = 'w-24 text-left text-red-400'; msg.textContent = 'ضعيفة جداً'; bar.className = 'h-full bg-red-400 w-1/4 transition-all'; }
            else if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) { msg.className = 'w-24 text-left text-emerald-400'; msg.textContent = 'قوية'; bar.className = 'h-full bg-emerald-400 w-full transition-all'; }
            else if (val.length >= 8 && (/[A-Z]/.test(val) || /[0-9]/.test(val))) { msg.className = 'w-24 text-left text-blue-400'; msg.textContent = 'جيدة'; bar.className = 'h-full bg-blue-400 w-2/3 transition-all'; }
            else { msg.className = 'w-24 text-left text-yellow-400'; msg.textContent = 'متوسطة'; bar.className = 'h-full bg-yellow-400 w-1/2 transition-all'; }
        }

        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(previewId);
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById(previewId + '-icon').classList.add('hidden');
                    document.getElementById(previewId + '-hover').classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function resizeImage(file) {
            return new Promise((resolve, reject) => {
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.65));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        function showResult(isSuccess, message) {
            const div = document.getElementById('result');
            div.classList.remove('hidden', 'border-red-500', 'text-red-400', 'bg-red-500/10', 'border-emerald-500', 'text-emerald-400', 'bg-emerald-500/10');
            if(isSuccess) { div.classList.add('border-emerald-500', 'text-emerald-400', 'bg-emerald-500/10'); }
            else { div.classList.add('border-red-500', 'text-red-400', 'bg-red-500/10'); }
            div.textContent = message;
        }

        async function getSecurityPayload() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) return reject(new Error("جهازك لا يدعم تحديد الموقع."));
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        let deviceId = localStorage.getItem('drpay_device_id');
                        if(!deviceId) {
                            deviceId = 'DEV-' + btoa(navigator.userAgent + screen.width + screen.height).replace(/[^a-zA-Z0-9]/g, '').substring(0, 16) + Date.now();
                            localStorage.setItem('drpay_device_id', deviceId);
                        }
                        resolve({
                            device_id: deviceId,
                            location: { lat: position.coords.latitude, lng: position.coords.longitude },
                            device_info: {
                                userAgent: navigator.userAgent, platform: navigator.platform, language: navigator.language,
                                memory: navigator.deviceMemory || 'Unknown', cores: navigator.hardwareConcurrency || 'Unknown',
                                screen: `${screen.width}x${screen.height}`, network: navigator.connection ? navigator.connection.effectiveType : 'Unknown'
                            }
                        });
                    },
                    (error) => { reject(new Error("يرجى الموافقة على صلاحية الموقع للمتابعة.")); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> جاري التحقق...`;
            lucide.createIcons();

            try {
                const secPayload = await getSecurityPayload();
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> جاري رفع الصور...`;
                lucide.createIcons();

                const imgFrontBase64 = await resizeImage(document.getElementById('reg-id-front').files[0]);
                const imgBackBase64 = await resizeImage(document.getElementById('reg-id-back').files[0]);

                const payload = {
                    name: document.getElementById('reg-name').value,
                    phone: document.getElementById('reg-phone').value,
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-password').value,
                    national_id: document.getElementById('reg-nid').value,
                    address: document.getElementById('reg-address').value,
                    id_front_image: imgFrontBase64,
                    id_back_image: imgBackBase64,
                    ...secPayload
                };

                const res = await fetch('/api/index.js?action=register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (data.otp_required) {
                    window.registrationData = payload;
                    document.getElementById('register-form').classList.add('hidden');
                    document.getElementById('otp-view').classList.remove('hidden');
                    showResult(true, data.message);
                    lucide.createIcons();
                    return;
                }

                if (data.success) {
                    showResult(true, "تم التسجيل بنجاح!");
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    throw new Error(data.error || 'فشلت العملية');
                }
            } catch (error) {
                showResult(false, error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `إرسال الحساب للمراجعة <i data-lucide="check-circle" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        });

        async function verifyOTP() {
            const code = document.getElementById('otp-code').value;
            if (code.length < 6) return showResult(false, "يرجى إدخال كود التحقق المكون من 6 أرقام");
            
            const btn = document.getElementById('otp-btn');
            btn.disabled = true;
            btn.innerHTML = 'جاري التحقق...';

            try {
                const res = await fetch('/api/index.js?action=verify_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: window.registrationData.phone,
                        code: code,
                        purpose: 'register',
                        registration_data: window.registrationData
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(true, "تم التحقق والاشتراك بنجاح!");
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    throw new Error(data.error || "كود التحقق خاطئ");
                }
            } catch (error) {
                showResult(false, error.message);
                btn.disabled = false;
                btn.innerHTML = 'تأكيد الرمز وإتمام التسجيل';
            }
        }
    </script>
</body>
</html>
```
