<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيصال عملية - الدكتور باي</title>
    <style>
        @font-face { font-family: 'Tajawal'; src: url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap'); }
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .receipt { width: 48mm; background: white; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); color: #000; font-size: 10px; line-height: 1.2; text-align: center; }
        .logo { width: 40px; height: 40px; margin: 5px auto; display: block; filter: grayscale(1); }
        .title { font-weight: 900; font-size: 12px; margin-bottom: 2px; }
        .subtitle { font-size: 8px; margin-bottom: 5px; border-bottom: 1px dashed #000; padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 3px; text-align: right; }
        .row span:first-child { font-weight: bold; }
        .sep { border-top: 1px dashed #000; margin: 5px 0; }
        .total { font-size: 14px; font-weight: 900; margin: 5px 0; }
        .footer { font-size: 7px; margin-top: 10px; color: #333; }
        .status { font-weight: bold; background: #000; color: #fff; padding: 2px 5px; display: inline-block; border-radius: 3px; margin: 5px 0; font-size: 9px; }
        
        @media print {
            body { padding: 0; background: none; }
            .receipt { box-shadow: none; width: 48mm; margin: 0; }
            .no-print { display: none; }
        }
        
        .no-print-btns { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 48mm; }
        .btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; color: white; font-size: 12px; }
        .btn-print { background: #1e293b; }
        .btn-share { background: #10b981; }
    </style>
</head>
<body>
    <div class="flex-col">
        <div class="receipt" id="print-area">
            <img src="logo/logo.png" class="logo">
            <div class="title">الدكتور باي • Dr Pay</div>
            <div class="subtitle">خدمات الدفع والتحصيل الإلكتروني</div>
            
            <div class="status">✔ عملية ناجحة</div>
            
            <div class="row"><span>الخدمة:</span><span id="srv-name">...</span></div>
            <div class="row"><span>التاريخ:</span><span id="srv-date">...</span></div>
            <div class="row"><span>الرقم:</span><span id="srv-target" style="font-family: monospace;">...</span></div>
            
            <div class="sep"></div>
            
            <div class="row"><span>القيمة:</span><span id="srv-amount">... ج.م</span></div>
            <div class="row"><span>الرسوم:</span><span id="srv-fees">... ج.م</span></div>
            <div class="total">الإجمالي: <span id="srv-total">...</span> ج.م</div>
            
            <div class="sep"></div>
            
            <div class="row"><span>مرجعي:</span><span id="srv-ref" style="font-family: monospace; font-size: 8px;">...</span></div>
            <div class="row"><span>التفاصيل:</span><span id="srv-det" style="font-size: 8px;">...</span></div>
            
            <div class="footer">
                عند البطء في الشبكة قد يستغرق التنفيذ حتى 24 ساعة<br>
                تم الدفع عبر ELDoctor Pay<br>
                الدعم: 01063151472
            </div>
        </div>

        <div class="no-print-btns no-print">
            <button onclick="window.print()" class="btn btn-print">طباعة الإيصال</button>
            <button onclick="share()" class="btn btn-share">مشاركة واتساب</button>
        </div>
    </div>

    <script>
        async function loadInvoice() {
            const urlParams = new URLSearchParams(window.location.search);
            const invId = urlParams.get('id');
            if(!invId) { alert('لم يتم العثور على رقم الفاتورة'); return; }

            const token = localStorage.getItem('drpay_token');
            if(!token) { alert('برجاء تسجيل الدخول أولاً'); return; }

            try {
                // Fetch me first to context, but let's try to fetch a specific transaction endpoint
                // Since I haven't added admin/transaction/id yet, let's use the local storage if missing or better, add it to API
                const res = await fetch(`/api/index.js?action=me/transactions`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                const tx = data.transactions.find(t => t.invoice_no === invId);
                
                if(!tx) { alert('الفاتورة غير موجودة'); return; }

                document.getElementById('srv-name').textContent = tx.service_name;
                document.getElementById('srv-date').textContent = new Date(tx.created_at).toLocaleString('ar-EG');
                document.getElementById('srv-target').textContent = tx.customer_phone || '-';
                document.getElementById('srv-amount').textContent = tx.amount;
                document.getElementById('srv-fees').textContent = (tx.total - tx.amount).toFixed(2);
                document.getElementById('srv-total').textContent = tx.total;
                document.getElementById('srv-ref').textContent = tx.invoice_no;
                document.getElementById('srv-det').textContent = tx.details || tx.service_name;

            } catch(e) {
                console.error(e);
                alert('خطأ في تحميل البيانات');
            }
        }

        function share() {
            const text = `*إيصال دفع Dr Pay*\n\nالخدمة: ${document.getElementById('srv-name').textContent}\nالرقم: ${document.getElementById('srv-target').textContent}\nالقيمة: ${document.getElementById('srv-total').textContent} ج.م\nالمرجع: ${document.getElementById('srv-ref').textContent}\n\nشكراً لك!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        loadInvoice();
    </script>
</body>
</html>
