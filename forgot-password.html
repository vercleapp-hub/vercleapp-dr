<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>استعادة كلمة المرور - الدكتور باي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-600/20 blur-[100px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md glass-panel rounded-3xl p-8 relative z-10 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20 shadow-xl">
                <i data-lucide="key-round" class="text-blue-400 w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-black text-white">استعادة كلمة المرور</h1>
            <p id="desc" class="text-xs text-slate-400 mt-2 font-bold">أدخل البيانات المسجلة لإرسال كود التحقق</p>
        </div>

        <!-- STEP 1: VERIFY FIELDS -->
        <form id="reset-request-form" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-2 mr-2 uppercase tracking-widest">رقم الموبايل المسجل</label>
                <input type="tel" id="r-phone" required class="w-full input-glass rounded-2xl px-5 py-4 text-base outline-none text-white font-mono tracking-widest" placeholder="01012345678">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-2 mr-2 uppercase tracking-widest">رقم البطاقة الشخصية</label>
                <input type="text" id="r-nid" required maxlength="14" minlength="14" class="w-full input-glass rounded-2xl px-5 py-4 text-base outline-none text-white font-mono tracking-widest" placeholder="29010...">
            </div>
            <button type="submit" id="req-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition shadow-xl active:scale-95 flex items-center justify-center gap-2 mt-2">
                إرسال كود التحقق <i data-lucide="send"></i>
            </button>
            <div class="text-center mt-4">
                <a href="login.html" class="text-xs text-slate-500 hover:text-white font-bold transition">رجوع لتسجيل الدخول</a>
            </div>
        </form>

        <!-- STEP 2: OTP -->
        <div id="otp-view" class="hidden space-y-6 text-center animate-fade-in">
            <div class="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20">
                <p class="text-[10px] text-blue-400 font-black">لقد قمنا بإرسال الكود للواتساب الخاص بك</p>
            </div>
            <input type="text" id="otp-code" maxlength="6" class="w-full text-center tracking-[1rem] py-5 bg-slate-900 rounded-2xl border border-slate-700 text-3xl font-black text-blue-400 outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="000000">
            <button onclick="verifyResetOTP()" id="otp-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition shadow-xl">تأكيد الكود والمتابعة</button>
        </div>

        <!-- STEP 3: NEW PASSWORD -->
        <form id="new-pass-form" class="hidden space-y-4 animate-fade-in">
            <div class="p-3 bg-emerald-500/10 rounded-xl border border-emerald-500/20 text-center mb-4">
                <p class="text-[10px] text-emerald-400 font-black uppercase tracking-widest">تأكيد الهوية بنجاح</p>
                <p class="text-white font-bold text-xs mt-1">يرجى تعيين كلمة المرور الجديدة الآن</p>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-2 mr-2">كلمة المرور الجديدة</label>
                <input type="password" id="new-password" required class="w-full input-glass rounded-2xl px-5 py-4 text-white font-mono outline-none focus:border-emerald-500" placeholder="••••••••">
            </div>
            <button type="submit" id="final-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition shadow-xl">حفظ كلمة المرور الجديدة</button>
        </form>

    </div>

    <script>
        lucide.createIcons();
        window.resetData = {};

        document.getElementById('reset-request-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            const btn = document.getElementById('req-btn');
            const phone = document.getElementById('r-phone').value;
            const nid = document.getElementById('r-nid').value;

            btn.disabled = true; btn.innerHTML = 'جاري التحقق...';
            try {
                const res = await fetch('/api/index.js?action=request_password_reset', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, national_id: nid })
                });
                const data = await res.json();
                if (data.success) {
                    window.resetData.phone = phone;
                    document.getElementById('reset-request-form').classList.add('hidden');
                    document.getElementById('otp-view').classList.remove('hidden');
                    document.getElementById('desc').textContent = "أدخل كود التحقق المكون من 6 أرقام";
                } else throw new Error(data.error);
            } catch(e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerHTML = 'إرسال كود التحقق <i data-lucide="send"></i>'; lucide.createIcons(); }
        });

        async function verifyResetOTP() {
            const code = document.getElementById('otp-code').value;
            const btn = document.getElementById('otp-btn');
            btn.disabled = true; btn.textContent = 'جاري التحقق...';
            try {
                const res = await fetch('/api/index.js?action=verify_password_reset_otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: window.resetData.phone, code })
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('otp-view').classList.add('hidden');
                    document.getElementById('new-pass-form').classList.remove('hidden');
                    document.getElementById('desc').textContent = "تم تأكيد هويتك، يرجى ملء الحقول";
                } else throw new Error(data.error);
            } catch(e) { alert(e.message); btn.disabled = false; btn.textContent = 'تأكيد الكود والمتابعة'; }
        }

        document.getElementById('new-pass-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const btn = document.getElementById('final-btn');
            btn.disabled = true; btn.textContent = 'جاري الحفظ...';
            try {
                const res = await fetch('/api/index.js?action=change_password_final', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: window.resetData.phone, password })
                });
                const data = await res.json();
                if(data.success) {
                    alert('تم تغيير كلمة المرور بنجاح! يمكنك الآن تسجيل الدخول.');
                    window.location.href = 'login.html';
                } else throw new Error(data.error);
            } catch(e) { alert(e.message); btn.disabled = false; btn.textContent = 'حفظ كلمة المرور الجديدة'; }
        });
    </script>
</body>
</html>
