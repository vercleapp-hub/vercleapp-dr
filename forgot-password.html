<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>استعادة الوصول - الدكتور باي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-box:focus-within { border-color: #3b82f6; background: rgba(30, 41, 59, 0.7); transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.3); }
        .step-indicator { width: 40px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.1); transition: all 0.5s; }
        .step-indicator.active { background: #3b82f6; width: 60px; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        @keyframes slide-in { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide { animation: slide-in 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Animated background patterns -->
    <div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
        <div class="absolute -top-24 -right-24 w-[500px] h-[500px] bg-blue-600/30 blur-[150px] rounded-full animate-pulse"></div>
        <div class="absolute -bottom-24 -left-24 w-[500px] h-[500px] bg-indigo-600/30 blur-[150px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass-card rounded-[3rem] p-10 shadow-3xl border border-white/10">
            <!-- Header Section -->
            <div class="text-center mb-10">
                <div class="inline-flex p-5 rounded-3xl bg-blue-500/10 border border-blue-500/20 mb-6 shadow-2xl shadow-blue-500/10">
                    <i data-lucide="shield-check" class="w-10 h-10 text-blue-400"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tight leading-tight">استعادة كلمة المرور</h1>
                <p id="sub-title" class="text-sm text-slate-400 mt-3 font-medium opacity-80">نحن هنا لمساعدتك على تأمين حسابك واستعادة الوصول إليه</p>
            </div>

            <!-- Progress Indicators -->
            <div class="flex justify-center gap-2 mb-10">
                <div id="step-1-dot" class="step-indicator active"></div>
                <div id="step-2-dot" class="step-indicator"></div>
                <div id="step-3-dot" class="step-indicator"></div>
            </div>

            <!-- CONTENT AREAS -->
            <div id="flow-container">
                <!-- STEP 1: Identification -->
                <form id="step-1-form" class="space-y-6 animate-slide">
                    <div class="space-y-4">
                        <div class="input-box rounded-2xl p-1 px-4">
                            <label class="block text-[10px] uppercase tracking-widest font-black text-slate-500 mt-2 mr-1">رقم الموبايل المسجل</label>
                            <input type="tel" id="r-phone" required class="w-full bg-transparent py-3 text-lg text-white font-mono outline-none" placeholder="010XXXXXXXX">
                        </div>
                        <div class="input-box rounded-2xl p-1 px-4">
                            <label class="block text-[10px] uppercase tracking-widest font-black text-slate-500 mt-2 mr-1">الرقم القومي (14 رقم)</label>
                            <input type="text" id="r-nid" required maxlength="14" minlength="14" class="w-full bg-transparent py-3 text-lg text-white font-mono outline-none" placeholder="290XXXXXXXXXXX">
                        </div>
                    </div>
                    <button type="submit" id="btn-1" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-blue-500/20 active:scale-95 flex items-center justify-center gap-3 group">
                        بدء التحقق من الهوية <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                    </button>
                    <div class="text-center pt-2">
                        <a href="login.html" class="text-xs text-slate-500 hover:text-white font-bold transition flex items-center justify-center gap-2">
                            <i data-lucide="chevron-right" class="w-3 h-3"></i> رجوع لتسجيل الدخول
                        </a>
                    </div>
                </form>

                <!-- STEP 2: OTP Verification -->
                <div id="step-2-view" class="hidden space-y-8 animate-slide text-center">
                    <div class="p-6 bg-blue-500/5 rounded-[2rem] border border-blue-500/10">
                        <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="smartphone" class="w-6 h-6 text-blue-400"></i>
                        </div>
                        <p class="text-sm font-bold text-white mb-2">تم إرسال رمز الأمان</p>
                        <p class="text-[11px] text-slate-400 leading-relaxed font-bold">يرجى إدخال الرمز المكون من 6 أرقام المرسل إلى الواتساب الخاص بك</p>
                    </div>

                    <div class="relative max-w-[260px] mx-auto">
                        <input type="text" id="otp-code" maxlength="6" class="w-full text-center tracking-[0.8em] py-6 bg-slate-900/50 rounded-3xl border-2 border-slate-700/50 text-4xl font-black text-blue-400 outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="000000">
                    </div>

                    <button onclick="verifyOTPFlow()" id="btn-2" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-blue-500/20">تأكيد الرمز والمتابعة</button>
                    
                    <button onclick="resendOTP()" class="text-xs text-slate-500 hover:text-blue-400 font-bold transition">لم يستلم الكود؟ إعادة الإرسال</button>
                </div>

                <!-- STEP 3: Reset Password -->
                <form id="step-3-form" class="hidden space-y-6 animate-slide">
                    <div class="p-5 bg-emerald-500/5 rounded-2xl border border-emerald-500/10 text-center">
                        <div class="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center mx-auto mb-3">
                            <i data-lucide="lock" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                        <p class="text-sm font-black text-white">تم التحقق من الهوية!</p>
                        <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">يرجى كتابة كلمة مرور جديدة قوية</p>
                    </div>

                    <div class="space-y-4">
                        <div class="input-box rounded-2xl p-1 px-4">
                            <label class="block text-[10px] uppercase tracking-widest font-bold text-slate-500 mt-2 mr-1">كلمة المرور الجديدة</label>
                            <input type="password" id="new-password" required minlength="6" class="w-full bg-transparent py-3 text-lg text-white font-mono outline-none" placeholder="••••••••">
                        </div>
                        <div class="input-box rounded-2xl p-1 px-4">
                            <label class="block text-[10px] uppercase tracking-widest font-bold text-slate-500 mt-2 mr-1">تأكيد كلمة المرور</label>
                            <input type="password" id="confirm-password" required minlength="6" class="w-full bg-transparent py-3 text-lg text-white font-mono outline-none" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" id="btn-3" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-emerald-500/20">حفظ وتحديث البيانات</button>
                </form>
            </div>
        </div>

        <!-- Footer Copyright -->
        <p class="text-center mt-12 text-[10px] text-slate-600 font-bold uppercase tracking-[0.3em] opacity-50">Secure Reset by Dr Pay &copy; 2026</p>
    </div>

    <script>
        lucide.createIcons();
        window.tempData = {};

        // STEP 1 Logic
        document.getElementById('step-1-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            const phone = document.getElementById('r-phone').value;
            const nid = document.getElementById('r-nid').value;
            const btn = document.getElementById('btn-1');

            btn.disabled = true; btn.innerHTML = 'جاري التحقق من السجلات...';
            try {
                const res = await fetch('/api/index.js?action=request_password_reset', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, national_id: nid })
                });
                const data = await res.json();
                if (data.success) {
                    window.tempData.phone = phone;
                    // Transition to step 2
                    document.getElementById('step-1-form').classList.add('hidden');
                    document.getElementById('step-2-view').classList.remove('hidden');
                    document.getElementById('step-1-dot').classList.remove('active');
                    document.getElementById('step-2-dot').classList.add('active');
                    document.getElementById('sub-title').textContent = "أدخل رمز التحقق الذي استلمته";
                } else throw new Error(data.error);
            } catch(e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerHTML = 'بدء التحقق من الهوية <i data-lucide="arrow-left" class="w-5 h-5"></i>'; lucide.createIcons(); }
        });

        // STEP 2 Logic
        async function verifyOTPFlow() {
            const code = document.getElementById('otp-code').value;
            const btn = document.getElementById('btn-2');
            if(code.length < 6) return alert('يرجى إدخال كود صحيح');

            btn.disabled = true; btn.textContent = 'جاري التأكد...';
            try {
                const res = await fetch('/api/index.js?action=verify_password_reset_otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: window.tempData.phone, code })
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('step-2-view').classList.add('hidden');
                    document.getElementById('step-3-form').classList.remove('hidden');
                    document.getElementById('step-2-dot').classList.remove('active');
                    document.getElementById('step-3-dot').classList.add('active');
                    document.getElementById('sub-title').textContent = "قم بتحديث كلمة المرور الخاصة بك الآن";
                } else throw new Error(data.error || 'الكود غير صحيح');
            } catch(e) { alert(e.message); btn.disabled = false; btn.textContent = 'تأكيد الرمز والمتابعة'; }
        }

        // STEP 3 Logic
        document.getElementById('step-3-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            const p1 = document.getElementById('new-password').value;
            const p2 = document.getElementById('confirm-password').value;
            if(p1 !== p2) return alert('كلمات المرور غير متطابقة!');

            const btn = document.getElementById('btn-3');
            btn.disabled = true; btn.textContent = 'جاري تحديث حسابك...';
            try {
                const res = await fetch('/api/index.js?action=change_password_final', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: window.tempData.phone, password: p1 })
                });
                const data = await res.json();
                if(data.success) {
                    alert('رائع! تمت استعادة حسابك بنجاح. يمكنك الآن تسجيل الدخول.');
                    window.location.href = 'login.html';
                } else throw new Error(data.error || 'فشل التحديث');
            } catch(e) { alert(e.message); btn.disabled = false; btn.textContent = 'حفظ وتحديث البيانات'; }
        });

        function resendOTP() {
            document.getElementById('step-2-view').classList.add('hidden');
            document.getElementById('step-1-form').classList.remove('hidden');
            document.getElementById('step-2-dot').classList.remove('active');
            document.getElementById('step-1-dot').classList.add('active');
        }
    </script>
</body>
</html>
